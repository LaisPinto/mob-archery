name: mob_archery
description: An archery training application built with Flutter.

version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  flutter_modular: ^6.2.1

  asuka: ^2.2.1
  mobx: ^2.1.1
  flutter_mobx: ^2.0.6
  material_symbols_icons: ^4.2892.0
  easy_localization: ^3.0.1
  intl: any
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cupertino_icons: ^1.0.5
  async: ^2.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.3.3
  mobx_codegen: ^2.1.1
  mocktail: ^1.0.4
  analyzer: ^8.1.1

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
